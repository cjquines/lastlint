- id: lastlint
  name: Evan's LaTeX style guide
  description: Lints .tex files against Evan Chen's LaTeX style guide.
  entry: lastlint
  language: python
  types: [tex]

- id: lastlint-fix
  name: Evan's LaTeX style guide (autofix)
  description: Auto-fixes supported rules, then reports anything left.
  entry: lastlint --fix
  language: python
  types: [tex]
