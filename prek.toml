# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

default_install_hook_types = [
  "pre-commit",
  "commit-msg",
  "pre-push",
]
default_stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  {
    id = "conventional-pre-commit",
    stages = ["commit-msg"],
    args = ["feat", "fix", "build", "ci", "chore", "docs", "drop", "edit",
     "perf", "polish", "root", "refactor", "revert", "style", "temp", "tests"]
  }
]

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "check-toml" },
  { id = "check-yaml", args = ["--allow-multiple-documents"] },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer", exclude = '^tests/fixtures/' },
  { id = "fix-byte-order-marker" },
  { id = "mixed-line-ending" },
  { id = "trailing-whitespace", exclude = '^tests/fixtures/' },
]

[[repos]]
repo = "meta"
hooks = [{ id = "check-useless-excludes" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12"
hooks = [{ id = "ruff-check" }, { id = "ruff-format" }]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"
hooks = [{ id = "codespell", exclude = '^tests/fixtures/' }]

[[repos]]
repo = "https://github.com/JoC0de/pre-commit-prettier"
rev = "v3.8.3"
hooks = [{ id = "prettier", types_or = ["json", "yaml", "markdown"] }]

# Self-lint: run evan-latex-lint on .tex files in the repo (none yet, but
# guards against accidentally committing broken .tex outside tests/fixtures/).
[[repos]]
repo = "local"
hooks = [
  {
    id = "evan-latex-lint",
    name = "Evan's LaTeX style guide",
    entry = "evan-latex-lint",
    language = "python",
    types = ["tex"],
    exclude = '^tests/fixtures/',
  },
]
